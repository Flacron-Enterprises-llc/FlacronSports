<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sports Widgets - Alternative Fix</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eff6ff 0%, #c7d2fe 100%);
    }
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      padding: 18px 0 12px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
    }
    .top-bar button {
      font-size: 1.1rem;
      font-weight: 600;
      background: none;
      border: none;
      color: #3730a3;
      padding: 8px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar button.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,0.08);
    }
    .widget-container {
      max-width: 1000px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 400px;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-bottom: 24px;
    }
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .widget-content {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .widget-content.loaded {
      opacity: 1;
    }
    .error-message {
      text-align: center;
      color: #dc2626;
      background: #fef2f2;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <button class="sport-btn active" data-sport="football">⚽ Football</button>
    <button class="sport-btn" data-sport="test">🧪 Test Widget</button>
  </div>

  <!-- Football -->
  <div id="football-container" class="widget-container">
    <h2>⚽ Live Football Games</h2>
    <div class="loading-container"><div class="loading-spinner"></div></div>
    <div class="widget-content">
      <!-- Single widget to test -->
      <div id="widget-placeholder"></div>
    </div>
  </div>

  <!-- Test Container -->
  <div id="test-container" class="widget-container" style="display:none;">
    <h2>🧪 Widget Test</h2>
    <div class="loading-container"><div class="loading-spinner"></div></div>
    <div class="widget-content">
      <div id="test-widget-placeholder"></div>
    </div>
  </div>

  <script>
    // Global error handler to catch and prevent the initialization error
    const originalError = window.onerror;
    window.onerror = function(message, source, lineno, colno, error) {
      if (message && message.includes('Cannot access') && message.includes('before initialization')) {
        console.warn('🔧 Caught initialization error:', message);
        console.warn('🔧 Attempting to recover...');
        
        // Try to reinitialize widgets after a delay
        setTimeout(() => {
          console.log('🔄 Attempting widget recovery...');
          tryInitializeWidget();
        }, 1000);
        
        return true; // Prevent default error handling
      }
      
      if (originalError) {
        return originalError.apply(this, arguments);
      }
      return false;
    };

    // Enhanced promise rejection handler
    window.addEventListener('unhandledrejection', function(event) {
      const error = event.reason;
      if (error && error.message && error.message.includes('Cannot access') && error.message.includes('before initialization')) {
        console.warn('🔧 Caught async initialization error:', error.message);
        event.preventDefault();
        
        // Try recovery
        setTimeout(() => {
          console.log('🔄 Attempting async widget recovery...');
          tryInitializeWidget();
        }, 1000);
      }
    });

    let widgetInitialized = false;
    let currentSport = 'football';

    function tryInitializeWidget() {
      if (widgetInitialized) return;
      
      console.log('🚀 Attempting widget initialization...');
      
      const placeholder = document.getElementById('widget-placeholder');
      const testPlaceholder = document.getElementById('test-widget-placeholder');
      
      if (!placeholder) {
        console.error('❌ Widget placeholder not found');
        return;
      }

      try {
        // Clear any existing content
        placeholder.innerHTML = '';
        testPlaceholder.innerHTML = '';
        
        // Try different widget configurations
        if (currentSport === 'football') {
          // Method 1: Single widget approach
          placeholder.innerHTML = `
            <api-sports-widget 
              data-type="config"
              data-key="04f48a5dfc83037bed7d86c7fc0b6818"
              data-sport="football"
              data-show-logos="true">
            </api-sports-widget>
            <api-sports-widget data-type="games"></api-sports-widget>
          `;
        } else if (currentSport === 'test') {
          // Method 2: Minimal test widget
          testPlaceholder.innerHTML = `
            <api-sports-widget 
              data-type="config"
              data-key="04f48a5dfc83037bed7d86c7fc0b6818"
              data-sport="football">
            </api-sports-widget>
          `;
        }
        
        // Try to initialize if WidgetsAPI is available
        if (window.WidgetsAPI && typeof window.WidgetsAPI.init === 'function') {
          console.log('✅ WidgetsAPI found, calling init...');
          setTimeout(() => {
            try {
              window.WidgetsAPI.init();
              widgetInitialized = true;
              console.log('✅ Widget initialization successful');
              showWidgetContent();
            } catch (initError) {
              console.error('❌ WidgetsAPI.init failed:', initError.message);
              showError('Widget initialization failed: ' + initError.message);
            }
          }, 100);
        } else {
          console.warn('⚠️ WidgetsAPI not available yet');
          setTimeout(tryInitializeWidget, 500);
        }
        
      } catch (error) {
        console.error('❌ Widget setup failed:', error.message);
        showError('Widget setup failed: ' + error.message);
      }
    }

    function showWidgetContent() {
      const containers = document.querySelectorAll('.widget-container');
      containers.forEach(container => {
        const widgetContent = container.querySelector('.widget-content');
        const loadingContainer = container.querySelector('.loading-container');
        
        if (widgetContent && loadingContainer) {
          widgetContent.classList.add('loaded');
          loadingContainer.style.display = 'none';
        }
      });
    }

    function showError(message) {
      const containers = document.querySelectorAll('.widget-container');
      containers.forEach(container => {
        const widgetContent = container.querySelector('.widget-content');
        const loadingContainer = container.querySelector('.loading-container');
        
        if (widgetContent && loadingContainer) {
          loadingContainer.style.display = 'none';
          widgetContent.innerHTML = `
            <div class="error-message">
              <h3>⚠️ Widget Loading Error</h3>
              <p>${message}</p>
              <button onclick="retryWidget()" style="background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
                🔄 Retry
              </button>
            </div>
          `;
          widgetContent.classList.add('loaded');
        }
      });
    }

    function retryWidget() {
      widgetInitialized = false;
      const containers = document.querySelectorAll('.widget-container');
      containers.forEach(container => {
        const widgetContent = container.querySelector('.widget-content');
        const loadingContainer = container.querySelector('.loading-container');
        
        if (widgetContent && loadingContainer) {
          widgetContent.classList.remove('loaded');
          loadingContainer.style.display = 'flex';
        }
      });
      
      setTimeout(tryInitializeWidget, 500);
    }

    // Container switching logic
    const buttons = document.querySelectorAll('.sport-btn');
    const containers = {
      football: document.getElementById('football-container'),
      test: document.getElementById('test-container')
    };

    function showContainer(selected) {
      currentSport = selected;
      
      Object.keys(containers).forEach(key => {
        const container = containers[key];
        const isSelected = key === selected;
        container.style.display = isSelected ? '' : 'none';
      });

      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sport === selected);
      });

      // Reinitialize widget for new sport
      widgetInitialized = false;
      setTimeout(tryInitializeWidget, 100);
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => showContainer(btn.dataset.sport));
    });

    // Try different widget script versions
    const widgetVersions = [
      'https://widgets.api-sports.io/3.1.0/widgets.js',
      'https://widgets.api-sports.io/3.0.0/widgets.js',
      'https://widgets.api-sports.io/2.9.0/widgets.js'
    ];

    let versionIndex = 0;

    function loadWidgetScript() {
      if (versionIndex >= widgetVersions.length) {
        console.error('❌ All widget script versions failed');
        showError('Failed to load widget library. All versions failed.');
        return;
      }

      const scriptUrl = widgetVersions[versionIndex];
      console.log(`🔄 Trying widget script version: ${scriptUrl}`);

      // Remove any existing script
      const existingScript = document.querySelector('script[src*="widgets.api-sports.io"]');
      if (existingScript) {
        existingScript.remove();
      }

      const script = document.createElement('script');
      script.type = 'module';
      script.src = scriptUrl;
      
      script.onload = function() {
        console.log(`✅ Widget script loaded: ${scriptUrl}`);
        setTimeout(() => {
          if (window.WidgetsAPI) {
            console.log('✅ WidgetsAPI available');
            tryInitializeWidget();
          } else {
            console.warn('⚠️ WidgetsAPI not available after script load');
            setTimeout(tryInitializeWidget, 1000);
          }
        }, 500);
      };
      
      script.onerror = function() {
        console.error(`❌ Failed to load: ${scriptUrl}`);
        versionIndex++;
        setTimeout(loadWidgetScript, 1000);
      };
      
      document.head.appendChild(script);
    }

    // Start loading widget script
    console.log('🚀 Starting widget script loading...');
    loadWidgetScript();

    // Fallback timeout
    setTimeout(() => {
      if (!widgetInitialized) {
        console.warn('⚠️ Widget initialization timeout');
        showError('Widget loading timed out. Please check your internet connection and API key.');
      }
    }, 10000);

    // Make retry function global
    window.retryWidget = retryWidget;
  </script>
</body>
</html>
