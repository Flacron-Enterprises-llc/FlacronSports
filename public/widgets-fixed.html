<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sports Widgets - FIXED</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eff6ff 0%, #c7d2fe 100%);
    }
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      padding: 18px 0 12px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
    }
    .top-bar button {
      font-size: 1.1rem;
      font-weight: 600;
      background: none;
      border: none;
      color: #3730a3;
      padding: 8px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar button.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,0.08);
    }
    .widget-container {
      max-width: 1000px;
      margin: 40px auto;
      background-color: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      min-height: 400px;
      position: relative;
    }
    h2 {
      text-align: center;
      margin-bottom: 24px;
    }
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .widget-content {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .widget-content.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <button class="sport-btn active" data-sport="football">⚽ Football</button>
    <button class="sport-btn" data-sport="baseball">⚾ Baseball</button>
    <button class="sport-btn" data-sport="hockey">🏒 Hockey</button>
    <button class="sport-btn" data-sport="rugby">🏉 Rugby</button>
    <button class="sport-btn" data-sport="basketball">🏀 Basketball</button>
    <button class="sport-btn" data-sport="volleyball">🏐 Volleyball</button>
    <button class="sport-btn" data-sport="afl">🏉 AFL</button>
    <button class="sport-btn" data-sport="formula1">🏎️ Formula 1</button>
    <button class="sport-btn" data-sport="mma">🥊 MMA</button>
    <button class="sport-btn" data-sport="nba">🏀 NBA</button>
    <button class="sport-btn" data-sport="nfl">🏈 NFL</button>
  </div>

  <!-- Football -->
  <div id="football-container" class="widget-container">
    <h2>⚽ Live Football Games</h2>
    <div class="loading-container"><div class="loading-spinner"></div></div>
    <div class="widget-content">
      <api-sports-widget data-type="config"
        data-key="04f48a5dfc83037bed7d86c7fc0b6818"
        data-sport="football"
        data-show-logos="true">
      </api-sports-widget>
      <api-sports-widget data-type="games"></api-sports-widget>
    </div>
  </div>

  <!-- Baseball -->

  <script>
    // Fix for "Cannot access 's' before initialization" error
    // This error occurs in the widget library's initCalendar function
    
    // Create a safe environment for the widgets to load
    window.addEventListener('error', function(e) {
      if (e.message && e.message.includes('Cannot access') && e.message.includes('before initialization')) {
        console.warn('Widget initialization error caught and handled:', e.message);
        e.preventDefault(); // Prevent the error from breaking the page
        return false;
      }
    });

    // Handle unhandled promise rejections (async errors)
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason && e.reason.message && e.reason.message.includes('Cannot access') && e.reason.message.includes('before initialization')) {
        console.warn('Widget async error caught and handled:', e.reason.message);
        e.preventDefault(); // Prevent the error from breaking the page
        return false;
      }
    });

    // Polyfill to ensure proper initialization order
    const originalCustomElementsDefine = customElements.define;
    customElements.define = function(name, constructor, options) {
      // Add a small delay to ensure proper initialization order
      setTimeout(() => {
        try {
          originalCustomElementsDefine.call(customElements, name, constructor, options);
        } catch (error) {
          console.warn('Custom element definition error handled:', error.message);
        }
      }, 10);
    };

    // Load the widget script with error handling
    const widgetScript = document.createElement('script');
    widgetScript.type = 'module';
    widgetScript.src = 'https://widgets.api-sports.io/3.1.0/widgets.js';
    
    widgetScript.onload = function() {
      console.log('Widget script loaded successfully');
      // Give widgets time to initialize properly
      setTimeout(initializeWidgets, 500);
    };
    
    widgetScript.onerror = function() {
      console.error('Failed to load widget script');
    };
    
    document.head.appendChild(widgetScript);

    // Initialize widgets with proper error handling
    function initializeWidgets() {
      const buttons = document.querySelectorAll('.sport-btn');
      const containers = {
        football: document.getElementById('football-container'),
        baseball: document.getElementById('baseball-container'),
        hockey: document.getElementById('hockey-container'),
        rugby: document.getElementById('rugby-container'),
        basketball: document.getElementById('basketball-container'),
        volleyball: document.getElementById('volleyball-container'),
        afl: document.getElementById('afl-container'),
        formula1: document.getElementById('formula1-container'),
        mma: document.getElementById('mma-container'),
        nba: document.getElementById('nba-container'),
        nfl: document.getElementById('nfl-container'),
      };

      function showContainer(selected) {
        Object.keys(containers).forEach(key => {
          const container = containers[key];
          const isSelected = key === selected;
          container.style.display = isSelected ? '' : 'none';

          if (isSelected) {
            const widgetContent = container.querySelector('.widget-content');
            const loadingContainer = container.querySelector('.loading-container');
            widgetContent.classList.remove('loaded');
            loadingContainer.style.display = 'flex';

            // Handle special cases with proper error handling
            if (key === 'formula1') {
              setTimeout(() => {
                try {
                  widgetContent.innerHTML = `
                    <api-sports-widget
                      data-type="config"
                      data-key="04f48a5dfc83037bed7d86c7fc0b6818"
                      data-sport="f1"
                      data-show-logos="true"
                      data-rankings="true">
                    </api-sports-widget>
                    <api-sports-widget data-type="races"></api-sports-widget>
                  `;
                  if (window.WidgetsAPI && typeof window.WidgetsAPI.init === 'function') {
                    window.WidgetsAPI.init();
                  }
                } catch (error) {
                  console.warn('Formula 1 widget initialization error handled:', error.message);
                }
                
                setTimeout(() => {
                  widgetContent.classList.add('loaded');
                  loadingContainer.style.display = 'none';
                }, 800);
              }, 100);
            }
            else if (key === 'mma') {
              setTimeout(() => {
                try {
                  widgetContent.innerHTML = `
                    <api-sports-widget
                      data-type="fights"
                      data-key="04f48a5dfc83037bed7d86c7fc0b6818"
                      data-sport="mma">
                    </api-sports-widget>
                    <api-sports-widget
                      data-type="config"
                      data-key="04f48a5dfc83037bed7d86c7fc0b6818"
                      data-sport="mma">
                    </api-sports-widget>
                  `;
                  if (window.WidgetsAPI && typeof window.WidgetsAPI.init === 'function') {
                    window.WidgetsAPI.init();
                  }
                } catch (error) {
                  console.warn('MMA widget initialization error handled:', error.message);
                }
                
                setTimeout(() => {
                  widgetContent.classList.add('loaded');
                  loadingContainer.style.display = 'none';
                }, 800);
              }, 100);
            }
            else {
              // For other sports, just show after delay
              setTimeout(() => {
                widgetContent.classList.add('loaded');
                loadingContainer.style.display = 'none';
              }, 1000);
            }
          }
        });

        buttons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.sport === selected);
        });
      }

      buttons.forEach(btn => {
        btn.addEventListener('click', () => showContainer(btn.dataset.sport));
      });

      // Initialize with football
      showContainer('football');
    }

    // Fallback initialization if script doesn't load
    setTimeout(() => {
      if (!window.WidgetsAPI) {
        console.warn('Widget API not loaded, initializing fallback');
        initializeWidgets();
      }
    }, 3000);
  </script>
